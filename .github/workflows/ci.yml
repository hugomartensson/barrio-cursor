# CI: lint, build, test, and security audit for the server.
# Runs on push and PR to main and portal-migration (and current dev branches).
# For tests to pass in CI, add DATABASE_URL or DIRECT_URL in repo Secrets and pass as env to the job.
name: CI

on:
  push:
    branches: [main, portal-migration]
  pull_request:
    branches: [main, portal-migration]

jobs:
  server:
    name: Server (lint, build, test, audit)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # Use DIRECT_URL for tests (add it in repo Secrets). Optional: add DATABASE_URL if you don't use DIRECT_URL.
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Security audit
        run: npm run audit
