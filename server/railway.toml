# Railway deploy config for Barrio API
# See: https://docs.railway.app/reference/build-and-start-commands

[build]
# Build TypeScript and generate Prisma client (install phase already runs npm ci)
buildCommand = "npm run build && npx prisma generate"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
# `prisma migrate deploy` safely applies any pending migrations without touching
# tables outside the Prisma schema (unlike `prisma db push` which can drop tables).
# Safe to run on every deploy.
startCommand = "npx prisma migrate deploy && node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
