# Railway deploy config for Barrio API
# See: https://docs.railway.app/reference/build-and-start-commands

[build]
# Build TypeScript and generate Prisma client (install phase already runs npm ci)
buildCommand = "npm run build && npx prisma generate"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
# Do NOT run `prisma db push` on every boot: it drops tables Prisma does not know
# about (e.g. mastra_workflow_snapshot from portal-mastra), which breaks the ingest
# admin with 500 on GET /api/workflows/ingest/runs.
#
# When you change `prisma/schema.prisma`, apply the schema once:
#   railway run --service <barrio-api> npx prisma db push --accept-data-loss
# or fix migrations and use: npx prisma migrate deploy
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
