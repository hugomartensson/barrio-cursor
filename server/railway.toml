# Railway deploy config for Barrio API
# See: https://docs.railway.app/reference/build-and-start-commands

[build]
builder = "nixpacks"
# Build TypeScript and generate Prisma client
buildCommand = "npm ci && npm run build && npx prisma generate"

[deploy]
# Run migrations then start (Railway sets PORT automatically)
startCommand = "npx prisma migrate deploy && node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
