<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ingest Queue</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
    .title { color: #f8fafc; font-weight: 600; }
    .meta { color: #94a3b8; font-size: 13px; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
    .pill { background: #0d9488; color: #ecfeff; border-radius: 999px; padding: 2px 8px; font-size: 12px; }
    .warn { background: #eab308; color: #111827; }
    .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .controls { display: flex; gap: 8px; }
    button { background: #0d9488; color: #ecfeff; border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    input { background: #020617; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h2>Portal Ingest Drafts</h2>
        <div id="count">0 drafts pending</div>
      </div>
      <div class="controls">
        <input id="email" type="email" placeholder="portal team email">
        <input id="password" type="password" placeholder="password">
        <button id="login">Login</button>
        <button id="refresh">Refresh</button>
      </div>
    </div>
    <div id="list"></div>
  </div>
  <script src="/admin/admin.js"></script>
  <script>
    const render = (drafts) => {
      document.getElementById('count').textContent = `${drafts.length} drafts pending`;
      const list = document.getElementById('list');
      list.innerHTML = drafts.map((draft) => `
        <div class="card" data-id="${draft.id}">
          <div class="title">${draft.name || 'Unnamed'}</div>
          <div class="meta">
            <span class="pill">${draft.itemType || 'unknown'}</span>
            <span>${draft.category || 'no category'}</span>
            <span>${new Date(draft.createdAt).toLocaleString()}</span>
            <span class="pill warn">${draft.flaggedFields.length} flagged</span>
          </div>
        </div>
      `).join('');

      [...document.querySelectorAll('.card')].forEach((el) => {
        el.addEventListener('click', () => {
          window.location.href = `/admin/draft.html?id=${el.getAttribute('data-id')}`;
        });
      });
    };

    const load = async () => {
      const response = await window.adminApi.fetchJson('/ingest/drafts');
      render(response.data || []);
    };

    document.getElementById('login').addEventListener('click', async () => {
      await window.adminApi.login(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      await load();
    });
    document.getElementById('refresh').addEventListener('click', load);
    if (window.adminApi.hasToken()) load();
  </script>
</body>
</html>
