<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ingest Queue</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color .15s; }
    .card:hover { border-color: #0d9488; }
    .title { color: #f8fafc; font-weight: 600; }
    .meta { color: #94a3b8; font-size: 13px; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
    .pill { background: #0d9488; color: #ecfeff; border-radius: 999px; padding: 2px 8px; font-size: 12px; }
    .warn { background: #eab308; color: #111827; }
    .head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 16px; }
    button { background: #0d9488; color: #ecfeff; border: 0; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 14px; min-height: 38px; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button.secondary { background: #475569; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #94a3b8; }
    input { background: #020617; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 14px; min-width: 200px; }
    input:disabled { opacity: 0.6; }
    #status {
      margin: 12px 0; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    #status[hidden] { display: none !important; }
    #status.info { display: block; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    #status.loading { display: block; background: #1e3a5f; border: 1px solid #2563eb; color: #bfdbfe; }
    #status.error { display: block; background: #450a0a; border: 1px solid #991b1b; color: #fecaca; }
    #status.ok { display: block; background: #042f2e; border: 1px solid #0d9488; color: #ccfbf1; }
    #login-section { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    #logged-in-section { display: none; gap: 8px; align-items: center; flex-wrap: wrap; }
    #user-label { color: #94a3b8; font-size: 13px; }
    #boot-fatal { display: none; margin: 16px 0; padding: 16px; background: #450a0a; border: 1px solid #991b1b; color: #fecaca; border-radius: 8px; }
    #boot-fatal.visible { display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <h2 style="margin:0 0 4px">Portal Ingest</h2>
        <div id="count" style="color:#94a3b8">—</div>
      </div>
      <div id="login-section">
        <div class="field">
          <label for="email">Email (login — not your name)</label>
          <input id="email" type="email" autocomplete="username" placeholder="you@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="button" id="loginBtn">Log in</button>
      </div>
      <div id="logged-in-section">
        <span id="user-label"></span>
        <button type="button" id="refreshBtn">Refresh</button>
        <button type="button" id="logoutBtn" class="secondary">Log out</button>
      </div>
    </div>

    <div id="boot-fatal" role="alert"></div>
    <div id="status" role="status" aria-live="polite" hidden></div>
    <div id="list"></div>
  </div>

  <!-- No inline scripts: Helmet CSP blocks them in production. Order matters. -->
  <script src="/admin/admin.js"></script>
  <script src="/admin/queue.js"></script>
</body>
</html>
