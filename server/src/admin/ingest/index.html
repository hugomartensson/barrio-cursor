<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ingest — Queue</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0d0d0d; color: #eee; }
    body { margin: 0; padding: 1rem; max-width: 960px; margin-inline: auto; }
    a { color: #8ab4ff; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button {
      background: #222; color: #eee; border: 1px solid #444; padding: 0.5rem 1rem;
      border-radius: 6px; cursor: pointer;
    }
    .tabs button.active { background: #333; border-color: #666; }
    .card {
      display: flex; gap: 1rem; align-items: center; padding: 0.75rem; margin-bottom: 0.5rem;
      background: #1a1a1a; border-radius: 8px; border: 1px solid #333; cursor: pointer;
    }
    .card:hover { border-color: #555; }
    .thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; background: #333; }
    .meta { flex: 1; }
    .badge { font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: #333; }
    .warn { border-color: #a85; }
    .card-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }
    .btn-approve { background: #2a4a2a; border: 1px solid #4a6; color: #8f8; padding: 0.3rem 0.7rem; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    .btn-approve:hover { background: #3a5a3a; }
    .btn-approve:disabled { opacity: 0.4; cursor: default; }
    .btn-skip { background: #2a1a1a; border: 1px solid #844; color: #f88; padding: 0.3rem 0.7rem; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
    .btn-skip:hover { background: #3a2a2a; }
    .btn-skip:disabled { opacity: 0.4; cursor: default; }
    #login-section, #logged-in-section { margin-bottom: 1rem; }
    #status { margin: 0.5rem 0; padding: 0.5rem; border-radius: 6px; }
    #status.error { background: #3a1a1a; color: #f88; }
    #status.ok { background: #1a2a1a; color: #8f8; }
    #status.info { background: #1a1a2a; color: #aaf; }
    input, textarea { padding: 0.4rem; margin-right: 0.5rem; background: #222; border: 1px solid #444; color: #eee; border-radius: 4px; }
    button.action { background: #2a4a2a; border: 1px solid #4a6; color: #eee; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; }
    #submit-section { margin-bottom: 1.5rem; padding: 1rem; background: #111; border: 1px solid #333; border-radius: 8px; }
    #submit-section h2 { margin: 0 0 0.75rem; font-size: 1rem; color: #ccc; }
    #urlInput { width: 100%; box-sizing: border-box; margin-bottom: 0.5rem; font-size: 0.95rem; }
    #contextNote { width: 100%; box-sizing: border-box; margin-bottom: 0.5rem; font-size: 0.9rem; resize: vertical; }
    #submitStatus { margin-top: 0.5rem; padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.9rem; display: none; }
    #submitStatus.error { background: #3a1a1a; color: #f88; display: block; }
    #submitStatus.ok { background: #1a2a1a; color: #8f8; display: block; }
    #submitStatus.info { background: #1a1a2a; color: #aaf; display: block; }
  </style>
</head>
<body>
  <h1>Portal Ingest</h1>
  <p>Mastra workflow queue — Spots and Events awaiting review.</p>

  <div id="login-section">
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="action" type="button" id="ingestLoginBtn">Log in</button>
  </div>
  <div id="logged-in-section" hidden>
    <button class="action" type="button" id="refreshBtn">Refresh</button>
    <button type="button" id="logoutBtn">Log out</button>
  </div>

  <div id="status" hidden></div>

  <div id="submit-section" hidden>
    <h2>Submit a URL for ingest</h2>
    <input type="url" id="urlInput" placeholder="https://ra.co/events/… or any venue/event URL" autocomplete="off">
    <textarea id="contextNote" rows="2" placeholder="Context note (optional) — e.g. 'Kulturnatt event, date is April 18'"></textarea>
    <button class="action" type="button" id="submitUrlBtn">Submit URL</button>
    <div id="submitStatus"></div>
  </div>

  <div class="tabs" id="tabs">
    <button type="button" data-tab="spot" class="active">Spots</button>
    <button type="button" data-tab="event">Events</button>
  </div>
  <div id="list"></div>

  <script src="admin.js"></script>
</body>
</html>
