<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft Review</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .row { display: grid; grid-template-columns: 170px 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
    input, textarea, select { width: 100%; background: #020617; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 8px; }
    textarea { min-height: 120px; }
    .actions { margin-top: 20px; display: flex; gap: 8px; }
    button { background: #0d9488; color: #ecfeff; border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .skip { background: #6b7280; }
    .warn { border-color: #eab308; }
    img { width: 220px; border-radius: 10px; border: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="wrap">
    <button onclick="window.location.href='/admin/'">Back</button>
    <h2>Draft Detail</h2>
    <div class="row"><label>Type</label><select id="itemType"><option>spot</option><option>event</option></select></div>
    <div class="row"><label>Name</label><input id="name"></div>
    <div class="row"><label>Description</label><textarea id="description"></textarea></div>
    <div class="row"><label>Category</label><select id="category"><option>food</option><option>drinks</option><option>music</option><option>art</option><option>markets</option><option>community</option></select></div>
    <div class="row"><label>Address</label><input id="address"></div>
    <div class="row"><label>Neighborhood</label><input id="neighborhood"></div>
    <div class="row"><label>Tags (comma)</label><input id="tags"></div>
    <div class="row"><label>Image URL</label><input id="imageUrl"></div>
    <div class="row"><label>Preview</label><img id="preview" alt="preview"></div>
    <div class="row eventOnly"><label>Start Time</label><input id="startTime" type="datetime-local"></div>
    <div class="row eventOnly"><label>End Time</label><input id="endTime" type="datetime-local"></div>
    <div class="actions">
      <button id="save">Save</button>
      <button id="approve">Approve</button>
      <button id="skip" class="skip">Skip</button>
    </div>
  </div>
  <script src="/admin/admin.js"></script>
  <script>
    const id = new URLSearchParams(window.location.search).get('id');
    const fields = ['itemType','name','description','category','address','neighborhood','tags','imageUrl','startTime','endTime'];
    let flagged = [];

    const toLocal = (value) => value ? new Date(value).toISOString().slice(0,16) : '';

    const readForm = () => ({
      itemType: document.getElementById('itemType').value || null,
      name: document.getElementById('name').value || null,
      description: document.getElementById('description').value || null,
      category: document.getElementById('category').value || null,
      address: document.getElementById('address').value || null,
      neighborhood: document.getElementById('neighborhood').value || null,
      tags: document.getElementById('tags').value.split(',').map((v) => v.trim()).filter(Boolean),
      imageUrl: document.getElementById('imageUrl').value || null,
      startTime: document.getElementById('startTime').value ? new Date(document.getElementById('startTime').value).toISOString() : null,
      endTime: document.getElementById('endTime').value ? new Date(document.getElementById('endTime').value).toISOString() : null
    });

    const applyWarnings = () => {
      fields.forEach((field) => {
        const el = document.getElementById(field);
        if (!el) return;
        if (flagged.includes(field)) el.classList.add('warn');
        else el.classList.remove('warn');
      });
    };

    const load = async () => {
      const response = await window.adminApi.fetchJson(`/ingest/drafts/${id}`);
      const d = response.data;
      flagged = d.flaggedFields || [];
      document.getElementById('itemType').value = d.itemType || 'spot';
      document.getElementById('name').value = d.name || '';
      document.getElementById('description').value = d.description || '';
      document.getElementById('category').value = d.category || 'community';
      document.getElementById('address').value = d.address || '';
      document.getElementById('neighborhood').value = d.neighborhood || '';
      document.getElementById('tags').value = (d.tags || []).join(', ');
      document.getElementById('imageUrl').value = d.imageUrl || '';
      document.getElementById('preview').src = d.imageUrl || '';
      document.getElementById('startTime').value = toLocal(d.startTime);
      document.getElementById('endTime').value = toLocal(d.endTime);
      applyWarnings();
    };

    document.getElementById('save').addEventListener('click', async () => {
      await window.adminApi.fetchJson(`/ingest/drafts/${id}`, { method: 'PATCH', body: JSON.stringify(readForm()) });
      await load();
    });

    document.getElementById('approve').addEventListener('click', async () => {
      await window.adminApi.fetchJson(`/ingest/drafts/${id}/approve`, { method: 'POST' });
      window.location.href = '/admin/';
    });

    document.getElementById('skip').addEventListener('click', async () => {
      await window.adminApi.fetchJson(`/ingest/drafts/${id}/skip`, { method: 'POST' });
      window.location.href = '/admin/';
    });

    document.getElementById('imageUrl').addEventListener('blur', (e) => {
      document.getElementById('preview').src = e.target.value || '';
    });

    if (window.adminApi.hasToken() && id) load();
  </script>
</body>
</html>
